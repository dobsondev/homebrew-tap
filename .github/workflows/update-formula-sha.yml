name: Update Formula SHA

on:
  push:
    tags:
      - 'v*'

jobs:
  update-formula:
    strategy:
      matrix:
        formula-file: 
          - Formula/desktop-file-helper.rb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(curl -sL "https://github.com/dobsondev/homebrew-tap/archive/refs/tags/${{ steps.tag.outputs.TAG }}.tar.gz" | sha256sum | awk '{print $1}')
          echo "SHA=$SHA" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          sed -i \
            -e 's|url ".*"|url "https://github.com/dobsondev/homebrew-tap/archive/refs/tags/${{ steps.tag.outputs.TAG }}.tar.gz"|' \
            -e 's|sha256 ".*"|sha256 "${{ steps.sha.outputs.SHA }}"|' \
            ${{ matrix.formula-file }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ matrix.formula-file }}
          git commit -m "chore: update ${{ matrix.formula-file }} to ${{ steps.tag.outputs.TAG }}"
          git push origin HEAD:main
