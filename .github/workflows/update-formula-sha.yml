name: Update Formula SHA

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      sha256: ${{ steps.sha.outputs.SHA }}
      tag: ${{ steps.tag.outputs.TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create tarball
        run: |
          git archive --format=tar.gz \
            --prefix=homebrew-tap-${{ steps.tag.outputs.TAG }}/ \
            HEAD \
            -o homebrew-tap-${{ steps.tag.outputs.TAG }}.tar.gz

      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(sha256sum homebrew-tap-${{ steps.tag.outputs.TAG }}.tar.gz | awk '{print $1}')
          echo "SHA=$SHA" >> $GITHUB_OUTPUT

      - name: Create GitHub release and upload tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.TAG }}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.tag.outputs.TAG }}" \
            --generate-notes \
            homebrew-tap-${{ steps.tag.outputs.TAG }}.tar.gz

  update-formula:
    needs: create-release
    strategy:
      matrix:
        formula-file:
          - Formula/desktop-file-helper.rb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Update formula
        env:
          TAG: ${{ needs.create-release.outputs.tag }}
          SHA: ${{ needs.create-release.outputs.sha256 }}
        run: |
          ASSET_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/homebrew-tap-${TAG}.tar.gz"
          sed -i \
            -e "s|url \".*\"|url \"${ASSET_URL}\"|" \
            -e "s|sha256 \".*\"|sha256 \"${SHA}\"|" \
            ${{ matrix.formula-file }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ matrix.formula-file }}
          git commit -m "chore: update ${{ matrix.formula-file }} to ${{ needs.create-release.outputs.tag }}"
          git push origin HEAD:main
